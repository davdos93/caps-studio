name: CAPS Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: caps-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Golden Masters and release validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Show runtime
        run: |
          node --version
          git --version

      - name: Run CAPS release validator
        run: |
          rm -f tests/results/QUALITY_GATE_REPORT.json
          node scripts/validate-release.js

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          const reportPath = "tests/results/QUALITY_GATE_REPORT.json";
          const lines = ["# CAPS Quality Gate", ""];
          if (!fs.existsSync(reportPath)) {
            lines.push("**Status:** fehlgeschlagen", "", "Der Release-Validator hat keinen gültigen Qualitätsbericht erzeugt.");
          } else {
            const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
            const regression = report.tests?.["REGRESSION_0.9.0_PHASE4.js"] || {};
            lines.push(
              `**Status:** ${report.status === "pass" ? "bestanden" : "fehlgeschlagen"}`,
              "",
              `- JavaScript-Dateien: ${report.javascriptFiles ?? "–"}`,
              `- Referenzfälle: ${regression.cases ?? "–"}`,
              `- Bestanden: ${regression.passed ?? "–"}`,
              `- Fehlgeschlagen: ${regression.failed ?? "–"}`,
              `- Deterministisch: ${regression.deterministic ? "ja" : "nein"}`,
              `- Manipulation erkannt: ${regression.mutationDetected ? "ja" : "nein"}`
            );
          }
          fs.appendFileSync(summaryFile, lines.join("\n") + "\n");
          NODE

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: caps-quality-gate-${{ github.run_number }}
          path: |
            tests/results/QUALITY_GATE_REPORT.json
            tests/results/REGRESSION_REPORT_0.9.0_PHASE4.json
            tests/results/BROWSER_SMOKE_0.9.0_PHASE4.json
          if-no-files-found: warn
          retention-days: 30
